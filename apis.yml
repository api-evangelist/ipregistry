apis:
  - name: IPregistry IP Geolocation and Threat Intelligence API
    description: >
      A REST API that resolves IPv4/IPv6 addresses and Autonomous System Numbers to
      rich intelligence including geolocation, ISP/carrier details, company data,
      currency and time zone, and threat classification across VPN, proxy, TOR, bot,
      and abuse categories. Supports single lookups, batch requests of up to 1,024 IPs,
      user-agent parsing, and ASN lookups, with optional EU base URL for GDPR-aligned
      data routing.
