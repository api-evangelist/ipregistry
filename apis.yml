aid: ipregistry
name: IPregistry
description: >
  IPregistry provides a fast, reliable IP geolocation and threat intelligence REST API
  for looking up information associated with IPv4 or IPv6 addresses and Autonomous Systems
  (AS). The API returns location data, connection details, company and carrier information,
  time zone, currency, and comprehensive security threat assessments from over 220 OSINT
  threat feeds. It supports single and batch IP lookups, user-agent parsing, ASN queries,
  and optional EU-region routing for data residency compliance. All lookups are authenticated
  via API key and billed against prepaid credits that never expire.
